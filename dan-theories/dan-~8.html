<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dan-~8</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:24px;line-height:1.6}
    .box{max-width:900px;margin:0 auto;padding:16px;border:1px solid #ddd;border-radius:14px;background:#fafafa}
    pre{white-space:pre-wrap;word-break:break-word;background:#0b1020;color:#e7eefc;padding:14px;border-radius:12px;overflow:auto}
    .muted{color:#666;font-size:13px}
    a{color:#0a58ca}
  </style>
</head>
<body>
  <div class="box">
    <a href="index.html">← back</a>
    <h1>dan-theories: dan-~8</h1>
    <p class="muted">Message-style page (no binary, no “lost content” artifacts).</p>
    <div id="content">Loading…</div>
  </div>

  <script>
    (async function(){
      const res = await fetch('dan-~8.json', {cache:'no-store'});
      const data = await res.json();
      document.getElementById('content').innerHTML = `
        <p class="muted">${data.title || data.id}</p>
        <pre>${escapeHtml(data.message || '')}</pre>
      `;
    })();

    function escapeHtml(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','<')
        .replaceAll('>','>')
        .replaceAll('"','"')
        .replaceAll("'",'&#039;');
    }
  </script>
</body>
</html>
